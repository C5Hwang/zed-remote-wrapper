name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.binary }} ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        binary: [listener, wrapper]
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          OUT="dist/zed-remote-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags "-s -w" -o "$OUT" "./cmd/${{ matrix.binary }}"

      - uses: actions/upload-artifact@v4
        with:
          name: zed-remote-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/zed-remote-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zed-remote-*
          generate_release_notes: true
